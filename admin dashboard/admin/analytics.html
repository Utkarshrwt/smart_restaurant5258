<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Business Intel | Smart Restaurant</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #f8fafc; --primary: #0f172a; --accent: #6366f1; --border: #e2e8f0; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Plus Jakarta Sans', sans-serif; }
        body { background: var(--bg); color: var(--primary); padding: 25px; }
        .container { max-width: 1400px; margin: auto; }
        
        /* Header & Navigation */
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; }
        .left-header { display: flex; align-items: center; gap: 20px; }
        
        .btn-back { 
            background: white; color: var(--primary); border: 1px solid var(--border); 
            padding: 10px 18px; border-radius: 10px; font-weight: 700; cursor: pointer; 
            text-decoration: none; font-size: 13px; transition: 0.2s; display: flex; align-items: center; gap: 8px;
        }
        .btn-back:hover { background: #f1f5f9; transform: translateX(-3px); border-color: var(--accent); }

        .tabs { display: flex; gap: 8px; background: #fff; padding: 6px; border-radius: 12px; border: 1px solid var(--border); }
        .tab-btn { padding: 10px 20px; border: none; background: none; font-weight: 700; cursor: pointer; border-radius: 8px; color: #64748b; font-size: 13px; }
        .tab-btn.active { background: var(--primary); color: white; }
        
        /* KPI Cards */
        .kpi-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 20px; margin-bottom: 30px; }
        .kpi-card { background: white; padding: 24px; border-radius: 16px; border: 1px solid var(--border); box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05); }
        .kpi-card span { font-size: 11px; color: #64748b; font-weight: 800; text-transform: uppercase; }
        .kpi-card h2 { font-size: 24px; margin-top: 10px; font-weight: 800; }
        
        /* Main Layout */
        .content-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 25px; }
        .box { background: white; padding: 25px; border-radius: 20px; border: 1px solid var(--border); min-height: 450px; }
        table { width: 100%; border-collapse: collapse; margin-top: 15px; }
        th { text-align: left; padding: 12px 10px; font-size: 11px; color: #64748b; border-bottom: 2px solid #f1f5f9; }
        td { padding: 12px 10px; border-bottom: 1px solid #f8fafc; font-weight: 600; font-size: 14px; }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <div class="left-header">
            <a href="admin.html" class="btn-back">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
                Back to Admin
            </a>
            <h1 style="font-weight: 800; font-size: 26px;">Analytics</h1>
        </div>
        <div class="tabs">
            <button class="tab-btn active" onclick="updateTab('today', this)">Today</button>
            <button class="tab-btn" onclick="updateTab('month', this)">This Month</button>
            <button class="tab-btn" onclick="updateTab('past30', this)">Last 30 Days</button>
            <button class="tab-btn" onclick="updateTab('year', this)">This Year (All)</button>
        </div>
    </div>

    <div class="kpi-grid">
        <div class="kpi-card"><span>Revenue</span><h2 id="rev">₹0</h2></div>
        <div class="kpi-card"><span>Expenses</span><h2 id="exp" style="color:#ef4444">₹0</h2></div>
        <div class="kpi-card"><span>Net Profit</span><h2 id="pro" style="color:#10b981">₹0</h2></div>
        <div class="kpi-card"><span>Staff Count</span><h2 id="staff">0</h2></div>
        <div class="kpi-card"><span>Menu Size</span><h2 id="menu">0</h2></div>
    </div>

    <div class="content-grid">
        <div class="box">
            <h3>💸 Add Bill/Expense</h3>
            <input type="text" id="exName" placeholder="Title (e.g. WiFi Bill)" style="width:100%; padding:12px; margin-top:15px; margin-bottom:10px; border:1px solid #ddd; border-radius:10px;">
            <input type="number" id="exAmt" placeholder="Amount (₹)" style="width:100%; padding:12px; margin-bottom:15px; border:1px solid #ddd; border-radius:10px;">
            <button onclick="saveExp()" style="width:100%; background:var(--accent); color:white; padding:14px; border:none; border-radius:10px; font-weight:700; cursor:pointer;">Save Expense</button>
            
            <div style="margin-top:25px;">
                <h4 style="font-size:12px; color:#64748b; margin-bottom:10px;">Recent Bills:</h4>
                <div style="max-height:150px; overflow-y:auto;">
                    <table style="font-size:12px;">
                        <tbody id="expenseList"></tbody>
                    </table>
                </div>
            </div>
        </div>

        <div class="box">
            <h3>🍕 Sales Mix</h3>
            <canvas id="dishChart"></canvas>
        </div>

        <div class="box">
            <h3>📈 Dish Ranking</h3>
            <table>
                <thead><tr><th>Item</th><th>Qty</th><th>Sales</th></tr></thead>
                <tbody id="rankBody"></tbody>
            </table>
        </div>
    </div>
</div>

<script type="module">
    import { db } from "../firebase/firebase.js"; 
    import { collection, getDocs, addDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    let allOrders = []; 
    let allExpenses = []; 
    let allAttendance = []; 
    let staffSalaryMap = {}; 
    let businessStart = new Date(2026, 2, 23); 
    let currentTab = 'today'; 
    let chartInstance = null;

    function forceDate(input) {
        if (!input) return null;
        if (input.seconds) return new Date(input.seconds * 1000);
        let d = new Date(input);
        if (!isNaN(d.getTime())) return d;
        try {
            const parts = input.split(',')[0].trim().split(' ');
            if(parts.length >= 2) {
                const day = parseInt(parts[0]);
                const months = { "Jan":0,"Feb":1,"Mar":2,"Apr":3,"May":4,"Jun":5,"Jul":6,"Aug":7,"Sep":8,"Oct":9,"Nov":10,"Dec":11 };
                const month = months[parts[1]];
                return new Date(2026, month, day);
            }
        } catch(e) {}
        return null;
    }

    async function loadData() {
        const [oSnap, eSnap, mSnap, xSnap, aSnap] = await Promise.all([
            getDocs(collection(db, "orders")),
            getDocs(collection(db, "employees")),
            getDocs(collection(db, "menu")),
            getDocs(collection(db, "other_expenses")),
            getDocs(collection(db, "attendance"))
        ]);

        eSnap.forEach(d => {
            const data = d.data();
            staffSalaryMap[d.id] = Number(data.salaryPerDay || 0);
        });

        oSnap.forEach(d => {
            let data = d.data();
            data.cleanDate = forceDate(data.time);
            allOrders.push(data);
        });

        xSnap.forEach(d => {
            let data = d.data();
            data.cleanDate = data.timestamp ? new Date(data.timestamp.seconds * 1000) : forceDate(data.date);
            allExpenses.push(data);
        });

        aSnap.forEach(d => {
            let data = d.data();
            data.cleanDate = forceDate(data.date); 
            allAttendance.push(data);
        });

        document.getElementById('staff').innerText = eSnap.size;
        document.getElementById('menu').innerText = mSnap.size;
        refresh();
    }

    window.updateTab = (t, b) => {
        currentTab = t;
        document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
        b.classList.add('active');
        refresh();
    }

    function refresh() {
        const now = new Date(2026, 3, 5); 
        const startOfToday = new Date(2026, 3, 5, 0, 0, 0);
        const startOfThisMonth = new Date(2026, 3, 1, 0, 0, 0);
        const thirtyDaysAgo = new Date(now.getTime() - (30 * 24 * 60 * 60 * 1000));

        let fOrders = []; let fExpenses = []; let fAttendance = [];

        if (currentTab === 'today') {
            fOrders = allOrders.filter(o => o.cleanDate >= startOfToday);
            fExpenses = allExpenses.filter(x => x.cleanDate >= startOfToday);
            fAttendance = allAttendance.filter(a => a.cleanDate >= startOfToday);
        } 
        else if (currentTab === 'month') {
            fOrders = allOrders.filter(o => o.cleanDate >= startOfThisMonth);
            fExpenses = allExpenses.filter(x => x.cleanDate >= startOfThisMonth);
            fAttendance = allAttendance.filter(a => a.cleanDate >= startOfThisMonth);
        } 
        else if (currentTab === 'past30') {
            fOrders = allOrders.filter(o => o.cleanDate >= thirtyDaysAgo);
            fExpenses = allExpenses.filter(x => x.cleanDate >= thirtyDaysAgo);
            fAttendance = allAttendance.filter(a => a.cleanDate >= thirtyDaysAgo);
        } 
        else { 
            fOrders = allOrders; 
            fExpenses = allExpenses;
            fAttendance = allAttendance;
        }

        let rev = 0; let dishMap = {};
        fOrders.forEach(o => {
            rev += Number(o.total || 0);
            o.items?.forEach(i => {
                if(!dishMap[i.name]) dishMap[i.name] = { q:0, v:0 };
                dishMap[i.name].q += Number(i.quantity);
                dishMap[i.name].v += (Number(i.quantity) * Number(i.price));
            });
        });

        // Calculate Salary Expense via Attendance
        let totalSalaryExpense = 0;
        fAttendance.forEach(record => {
            if (record.status === "Present" || record.status === "p") {
                const dailyRate = staffSalaryMap[record.empId] || 0;
                totalSalaryExpense += dailyRate;
            }
        });

        const billsTotal = fExpenses.reduce((sum, x) => sum + Number(x.amount || 0), 0);
        const totalExp = totalSalaryExpense + billsTotal;

        document.getElementById('rev').innerText = "₹" + Math.round(rev).toLocaleString();
        document.getElementById('exp').innerText = "₹" + Math.round(totalExp).toLocaleString();
        document.getElementById('pro').innerText = "₹" + (Math.round(rev) - Math.round(totalExp)).toLocaleString();

        const rBody = document.getElementById('rankBody'); rBody.innerHTML = "";
        const sorted = Object.entries(dishMap).sort((a,b) => b[1].q - a[1].q);
        sorted.forEach(([n, d]) => {
            rBody.innerHTML += `<tr><td>${n}</td><td>${d.q}</td><td>₹${d.v.toLocaleString()}</td></tr>`;
        });

        const exList = document.getElementById('expenseList'); exList.innerHTML = "";
        fExpenses.forEach(x => {
            exList.innerHTML += `<tr><td>${x.name}</td><td style="text-align:right">₹${x.amount}</td></tr>`;
        });

        if(chartInstance) chartInstance.destroy();
        chartInstance = new Chart(document.getElementById('dishChart'), {
            type: 'doughnut',
            data: {
                labels: sorted.slice(0,5).map(x => x[0]),
                datasets: [{ data: sorted.slice(0,5).map(x => x[1].q), backgroundColor: ['#6366f1', '#10b981', '#f59e0b', '#ef4444', '#8b5cf6'], borderWidth: 0 }]
            },
            options: { cutout: '75%', plugins: { legend: { position: 'bottom' } } }
        });
    }

    window.saveExp = async () => {
        const n = document.getElementById('exName').value;
        const a = Number(document.getElementById('exAmt').value);
        if(n && a) {
            await addDoc(collection(db, "other_expenses"), { 
                name: n, amount: a, date: new Date().toLocaleDateString(), timestamp: serverTimestamp() 
            });
            location.reload();
        }
    }

    loadData();
</script>
</body>
</html>
