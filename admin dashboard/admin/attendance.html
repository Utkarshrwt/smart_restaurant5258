<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Daily Attendance | Smart Restaurant</title>
    <link rel="stylesheet" href="management.css">
    <style>
        .page-container { padding: 40px; max-width: 900px; margin: auto; display: block !important; }
        .att-card { background: white; padding: 30px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); position: relative !important; height: auto !important; }
        .btn { transition: all 0.3s ease; cursor: pointer; border: none; padding: 10px 15px; border-radius: 6px; font-weight: bold; }
        .btn-present { background: #2ecc71; color: white; margin-right: 5px; }
        .btn-present:hover { background: #27ae60; transform: scale(1.1); box-shadow: 0 4px 10px rgba(46,204,113,0.3); }
        .btn-absent { background: #e74c3c; color: white; }
        .btn-absent:hover { background: #c0392b; transform: scale(1.1); box-shadow: 0 4px 10px rgba(231,76,60,0.3); }
        .status-tag { padding: 8px 15px; border-radius: 20px; font-weight: bold; animation: popIn 0.3s ease; display: inline-block; }
        @keyframes popIn { from { transform: scale(0.5); opacity: 0; } to { transform: scale(1); opacity: 1; } }
        .tag-present { background: #e8f5e9; color: #2e7d32; border: 1px solid #2ecc71; }
        .tag-absent { background: #ffebee; color: #c62828; border: 1px solid #e74c3c; }
    </style>
</head>
<body>
    <div class="page-container">
        <button onclick="location.href='admin.html'" class="btn" style="background:#333; color:white; margin-bottom:20px;">← Back</button>
        <div class="att-card">
            <h2>Daily Attendance Marking</h2>
            <p>Today's Date: <b id="displayDate"></b></p>
            <table>
                <thead>
                    <tr>
                        <th>Employee (Unique ID)</th>
                        <th>Role</th>
                        <th>Action</th>
                    </tr>
                </thead>
                <tbody id="attList"></tbody>
            </table>
        </div>
    </div>

<script type="module">
    import { db } from "../firebase/firebase.js";
    import { collection, onSnapshot, doc, setDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    const today = new Date().toISOString().slice(0, 10);
    const month = today.slice(0, 7);
    document.getElementById("displayDate").innerText = new Date().toDateString();

    onSnapshot(collection(db, "employees"), (snapshot) => {
        const list = document.getElementById("attList");
        list.innerHTML = "";

        snapshot.forEach((docSnap) => {
            const emp = docSnap.data();
            const empId = docSnap.id;

            if(emp.status === "active") {
                const tr = document.createElement("tr");
                tr.innerHTML = `<td><b>${emp.name}</b><br><small style="color:gray">ID: ...${empId.slice(-5)}</small></td>
                                <td>${emp.role}</td>
                                <td id="cell-${empId}">Loading...</td>`;
                list.appendChild(tr);

                onSnapshot(doc(db, "attendance", `${empId}_${today}`), (attSnap) => {
                    const cell = document.getElementById(`cell-${empId}`);
                    if (!cell) return;
                    if (attSnap.exists()) {
                        const status = attSnap.data().status;
                        cell.innerHTML = status === "Present" 
                            ? `<span class="status-tag tag-present">✓ Present</span>` 
                            : `<span class="status-tag tag-absent">✗ Absent</span>`;
                    } else {
                        cell.innerHTML = `<button class="btn btn-present" onclick="mark('${empId}', 'Present')">Present</button>
                                          <button class="btn btn-absent" onclick="mark('${empId}', 'Absent')">Absent</button>`;
                    }
                });
            }
        });
    });

    window.mark = async (id, status) => {
        await setDoc(doc(db, "attendance", `${id}_${today}`), { empId: id, date: today, month: month, status: status });
    };
</script>
</body>
</html>
