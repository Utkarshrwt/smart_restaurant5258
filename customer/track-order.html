<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Track Order</title>
    <style>
        /* Base styles */
        body {
            font-family: Arial, sans-serif;
            background: #f5f5f5;
            padding: 20px;
            margin: 0;
        }

        h2 {
            text-align: center;
            margin-bottom: 20px;
            font-size: 24px;
        }

        .box {
            background: white;
            padding: 20px;
            border-radius: 10px;
            max-width: 500px;
            margin: auto;
            box-sizing: border-box;
        }

        #orderDetails {
            margin-bottom: 15px;
        }

        #status {
            margin-top: 10px;
            font-weight: bold;
        }

        #timer {
            margin-top: 5px;
            color: #555;
        }

        .status-new {
            color: red;
        }

        .status-preparing {
            color: orange;
        }

        .status-completed {
            color: green;
        }

        button {
            display: block;
            margin: 20px auto 0 auto;
            padding: 12px 20px;
            background: #ff6b00;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            width: 100%;
            max-width: 200px;
            font-size: 16px;
            transition: 0.3s;
        }

        button:hover {
            background: #ff8126;
            transform: scale(1.03);
        }

        /* Responsive Styles */
        @media (max-width: 768px) {
            body {
                padding: 15px;
            }

            h2 {
                font-size: 22px;
            }

            .box {
                padding: 18px;
            }

            button {
                font-size: 15px;
                padding: 10px;
            }
        }

        @media (max-width: 480px) {
            body {
                padding: 10px;
            }

            h2 {
                font-size: 20px;
            }

            .box {
                padding: 15px;
            }

            button {
                font-size: 14px;
                padding: 10px;
            }
        }
    </style>
</head>

<body>

    <h2>Track Your Order</h2>

    <div class="box">
        <div id="orderDetails"></div>

        <h3 id="status"></h3>
        <h3 id="timer"></h3>
    </div>

    <button onclick="goBack()">Back</button>

    <script type="module" src="track-order.js"></script>
    <script>
        function goBack() {
            window.history.back();
        }
    </script>

</body>

</html>
